<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 160">
  <defs>
    <linearGradient id="chimney-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="chimney-white" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="50%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
  </defs>
  <!-- 烟囱主体 - 红白交替条纹 -->
  <!-- 底座（宽） -->
  <path d="M15,155 L20,135 L60,135 L65,155 Z" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <!-- 烟囱筒身 -->
  <rect x="22" y="20" width="36" height="115" rx="2" fill="url(#chimney-body)" stroke="#991b1b" stroke-width="1.5"/>
  <!-- 白色条纹 -->
  <rect x="22" y="35" width="36" height="15" fill="url(#chimney-white)"/>
  <rect x="22" y="65" width="36" height="15" fill="url(#chimney-white)"/>
  <rect x="22" y="95" width="36" height="15" fill="url(#chimney-white)"/>
  <!-- 烟囱顶部 -->
  <rect x="18" y="16" width="44" height="8" rx="2" fill="#7f1d1d" stroke="#991b1b" stroke-width="1.5"/>
  <!-- 烟雾 -->
  <ellipse cx="40" cy="8" rx="12" ry="5" fill="#9ca3af" opacity="0.3"/>
  <ellipse cx="36" cy="2" rx="8" ry="4" fill="#9ca3af" opacity="0.2"/>
  <ellipse cx="44" cy="-3" rx="6" ry="3" fill="#9ca3af" opacity="0.15"/>
  <!-- 平台栏杆 -->
  <line x1="16" y1="60" x2="64" y2="60" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="14" y="55" width="52" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <!-- 爬梯 -->
  <line x1="58" y1="60" x2="58" y2="135" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="62" y1="60" x2="62" y2="135" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="58" y1="70" x2="62" y2="70" stroke="#94a3b8" stroke-width="1"/>
  <line x1="58" y1="80" x2="62" y2="80" stroke="#94a3b8" stroke-width="1"/>
  <line x1="58" y1="90" x2="62" y2="90" stroke="#94a3b8" stroke-width="1"/>
  <line x1="58" y1="100" x2="62" y2="100" stroke="#94a3b8" stroke-width="1"/>
  <line x1="58" y1="110" x2="62" y2="110" stroke="#94a3b8" stroke-width="1"/>
  <line x1="58" y1="120" x2="62" y2="120" stroke="#94a3b8" stroke-width="1"/>
  <line x1="58" y1="130" x2="62" y2="130" stroke="#94a3b8" stroke-width="1"/>
</svg>
